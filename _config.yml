# Hexo Configuration
## Docs: http://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Charvel 互联网自留地
subtitle: 记录生活的点点滴滴，记录技术的淅淅沥沥
description: 
author: Well Cheng
email: chengwei3269@hotmail.com 
language: zh-Hans
timezone:
since: 2017 # blog create year for Next theme


# 多说 ShortName
duoshuo_shortname: devcheng # xxx即是shortname。


# Social links
social:
  Github: https://github.com/wellcheng
  Weibo: http://weibo.com/wellcheng
  Email: mailto:chengwei3269@hotmail.com
  # zhihu: http://www.zhihu.com/people/your-user-name

# links
links:
  我的简书地址: http://www.jianshu.com/u/788dc5288de4
  我的新浪微博: http://weibo.com/wellcheng




# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://blog.devcheng.com
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Archives 默认值为2，这里都修改为1，相应页面就只会列出标题，而非全文
## 2: Enable pagination
## 1: Disable pagination
## 0: Fully Disable
archive: 1
category: 1
tag: 1 

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 5
pagination_dir: page

# Extensions
## Plugins: http://hexo.io/plugins/
## Themes: http://hexo.io/themes/
theme: next

# Deployment
## Docs: http://hexo.io/docs/deployment.html
deploy: 
  type: git 
  repository: git@github.com:wellcheng/wellcheng.github.io.git
  branch: master

# 插件

feed:
  type: atom       #feed 类型 (atom/rss2)
  path: atom.xml   #rss 路径
  limit: 0        #在 rss 中最多生成的文章数(0显示所有)

# other
avatar: http://7vzucb.com1.z0.glb.clouddn.com/blog.avatar.png

# ---------------下面选项需要对应插件的支持---------------
# npm install hexo-generator-index --save
# npm install hexo-generator-archive --save
# npm install hexo-generator-category --save
# npm install hexo-generator-tag --save
archive_generator:
  per_page: 20 ##归档页面默认20篇文章标题
  yearly: true  ##生成年视图
  monthly: true ##生成月视图

tag_generator:
  per_page: 10 ##标签分类页面默认10篇文章

category_generator:
  per_page: 10 ###分类页面默认10篇文章


baidusitemap:
  path: baidusitemap.xml

baidu_analytics: 72ebb674888cae6e7d1a8f9528581e4d  



